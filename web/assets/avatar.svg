<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pitchwire">
  <!-- Signal room: ink ground, one brass wire, one amber live node. No gradient. -->
  <rect width="512" height="512" rx="96" fill="#14110E"/>

  <!-- Morse tick — the signal, tapped out: dot dot dash -->
  <g fill="#EDE6D6">
    <rect x="150" y="150" width="26" height="26" rx="4"/>
    <rect x="196" y="150" width="26" height="26" rx="4"/>
    <rect x="242" y="150" width="120" height="26" rx="4"/>
  </g>

  <!-- The wire -->
  <line x1="96" y1="300" x2="416" y2="300" stroke="#9A7B4F" stroke-width="14" stroke-linecap="round"/>

  <!-- The live node on the wire -->
  <circle cx="176" cy="300" r="40" fill="#C6532A"/>
  <circle cx="176" cy="300" r="40" fill="none" stroke="#14110E" stroke-width="10"/>

  <!-- The key contact travelling down the line -->
  <rect x="336" y="266" width="18" height="68" rx="6" fill="#EDE6D6"/>
</svg>
